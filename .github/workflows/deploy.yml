name: CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Build
        run: npm run build

  deploy:
    name: Deploy to Server
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            echo "Starting Deployment..."
            
            # Create directory if it does not exist
            if [ ! -d "/home/processManager" ]; then
              echo "Verzeichnis /home/processManager existiert nicht. Erstelle..."
              mkdir -p /home/processManager
            fi
            
            cd /home/processManager
            
            # Check if git repository is present, if not clone it
            if [ ! -d ".git" ]; then
              echo "Git-Repository nicht initialisiert. Klone..."
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
            else
              # Update remote URL with the fresh temporary GITHUB_TOKEN
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git pull origin main
            fi
            
            # Create .env if it does not exist
            if [ ! -f ".env" ]; then
              echo "Erstelle .env Datei auf dem Server..."
              RANDOM_SECRET=$(openssl rand -hex 32 2>/dev/null || echo "fallback-secret-phrase-that-is-at-least-32-chars-long")
              
              ENV_PASS="${{ secrets.AUTH_PASSWORD }}"
              if [ -z "$ENV_PASS" ]; then
                # Generate a random 12-char password
                ENV_PASS=$(openssl rand -base64 12 2>/dev/null | tr -dc 'a-zA-Z0-9' | head -c 12 || echo "admin123")
                echo "========================================="
                echo "Generiertes Passwort fuer Dashboard: $ENV_PASS"
                echo "Du kannst dieses Passwort in /home/processManager/.env aendern."
                echo "========================================="
              fi
              
              ENV_EMAIL="${{ secrets.AUTH_EMAIL }}"
              if [ -z "$ENV_EMAIL" ]; then
                ENV_EMAIL="admin@admin.com"
              fi
              
              echo "PORT=${{ secrets.SERVER_PORT || 3500 }}" > .env
              echo "AUTH_EMAIL=$ENV_EMAIL" >> .env
              echo "AUTH_PASSWORD=$ENV_PASS" >> .env
              echo "AUTH_SECRET=$RANDOM_SECRET" >> .env
              echo "NODE_ENV=production" >> .env
              chmod 600 .env
            fi
            
            # Install dependencies (including devDependencies needed for npm run build)
            npm install
            
            # Build application
            npm run build
            
            # Reload or start application in PM2
            if pm2 describe process-manager > /dev/null 2>&1; then
              echo "Reloading process-manager..."
              pm2 reload process-manager
            else
              echo "Starting process-manager for the first time..."
              pm2 start node_modules/next/dist/bin/next --name "process-manager" -- start
            fi
            
            echo "Deployment completed successfully!"
